<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E7A6F">
<meta name="description" content="Free guide: roughly how much money to prepare for hospital procedures in the Philippines, with PhilHealth coverage and where to get help paying. Estimates only.">
<title>Gastimate — Prepare for hospital costs (PH)</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F2EA; --card:#FFFFFF; --ink:#16302B; --muted:#5F6F6A;
    --teal:#0E7A6F; --teal-d:#0A574F; --teal-soft:#E4F0ED;
    --coral:#C2543B; --coral-d:#A8412B; --coral-soft:#FBEAE4;
    --gold:#B07D1A; --gold-soft:#FBF1DA;
    --navy:#274B63; --navy-d:#1C3A4E;
    --line:#E7E2D6;
    --shadow:0 4px 18px rgba(22,48,43,.08); --shadow-l:0 10px 30px rgba(22,48,43,.13);
    --serif:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding-bottom:env(safe-area-inset-bottom)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .bic{fill:currentColor;display:inline-block;vertical-align:-.15em;flex:none}
  .wrap{max-width:600px;margin:0 auto;padding:0 16px 96px}

  header{position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;
    padding:calc(env(safe-area-inset-top) + 15px) 16px 15px;box-shadow:0 4px 20px rgba(10,87,79,.30)}
  .hbar{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:#fff;color:var(--teal);
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:23px;
    flex:none;box-shadow:0 2px 9px rgba(0,0,0,.16)}
  .brand h1{font-family:var(--serif);font-size:24px;margin:0;font-weight:700;letter-spacing:.2px;white-space:nowrap}
  .brand p{margin:2px 0 0;font-size:11.5px;color:#C9E7E2;font-weight:500;letter-spacing:.2px}
  .lang{display:flex;background:rgba(255,255,255,.15);border-radius:999px;padding:3px;flex:none}
  .lang button{color:#DCEFEB;font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px;transition:.15s}
  .lang button.on{background:#fff;color:var(--teal)}

  .hero{margin:20px 2px 2px}
  .hero h2{font-family:var(--serif);font-weight:600;font-size:22px;line-height:1.28;margin:0;letter-spacing:-.2px}
  .hero p{margin:8px 0 0;font-size:13.5px;color:var(--muted);line-height:1.5}

  .note{background:var(--gold-soft);border:1px solid #ECD8A5;color:#6B581F;border-radius:13px;
    padding:11px 14px;font-size:12px;line-height:1.5;margin:16px 0 4px;display:flex;gap:9px}
  .note b{color:#5A4914}

  h2.sec{font-family:var(--sans);font-size:12px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);
    font-weight:700;margin:26px 4px 13px;display:flex;align-items:center;gap:11px}
  h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}
  .search{width:100%;margin:0 0 12px;padding:12px 14px;border:1px solid var(--line);border-radius:13px;
    font-family:inherit;font-size:15px;background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .search:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,122,111,.15)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;
    text-align:left;box-shadow:var(--shadow);transition:transform .1s ease,box-shadow .15s;min-height:120px;
    display:flex;flex-direction:column;justify-content:space-between}
  .card:active{transform:scale(.97);box-shadow:var(--shadow-l)}
  .chip{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:25px;line-height:1}
  .card .nm{display:block;font-size:15px;font-weight:700;margin-top:13px;line-height:1.2;letter-spacing:-.1px}
  .card .also{display:block;font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.3}

  .help-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .help{border-radius:18px;padding:16px 15px;text-align:left;font-weight:700;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:11px;color:#fff;min-height:108px;justify-content:space-between;transition:transform .1s}
  .help:active{transform:scale(.97)}
  .help .emo{display:flex}
  .help .t{font-size:15px;line-height:1.2}
  .help .s{font-size:11.5px;font-weight:500;opacity:.92;margin-top:-7px}
  .help.aid{background:linear-gradient(140deg,#CB5C44,#A8412B)}
  .help.phil{background:linear-gradient(140deg,#11897D,#0A574F)}
  .help.hosp{background:linear-gradient(140deg,#2E5470,#1C3A4E)}
  .help.share{background:linear-gradient(140deg,#C2912F,#876010)}

  footer{max-width:600px;margin:28px auto 0;padding:0 4px;color:var(--muted);font-size:11px;line-height:1.6;text-align:center}
  .reviewed{font-size:11px;color:var(--muted);text-align:center;margin-top:16px}

  .scrim{position:fixed;inset:0;background:rgba(15,40,36,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);
    border-radius:22px 22px 0 0;max-width:600px;margin:0 auto;max-height:92vh;overflow-y:auto;
    transform:translateY(102%);transition:transform .26s cubic-bezier(.22,1,.36,1);
    padding:8px 16px calc(env(safe-area-inset-bottom) + 24px);box-shadow:0 -8px 44px rgba(0,0,0,.24)}
  .sheet.show{transform:translateY(0)}
  .grab{width:42px;height:5px;border-radius:3px;background:#CBD6D3;margin:8px auto 6px}
  .sheet-head{display:flex;align-items:center;gap:12px;margin:6px 2px}
  .sheet-head .emo{display:flex;font-size:30px;line-height:1}
  .sheet-head h3{margin:0;font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.2px}
  .sheet-head .x{margin-left:auto;width:34px;height:34px;border-radius:50%;background:#fff;
    border:1px solid var(--line);color:var(--muted);flex:none;display:flex;align-items:center;justify-content:center}

  .big{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:13px;box-shadow:var(--shadow)}
  .big .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
  .big .amt{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--teal-d);letter-spacing:-.6px;margin-top:4px;line-height:1.04}
  .big .eur{font-size:12.5px;color:var(--muted);margin-top:5px}

  .toggle{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-top:11px}
  .toggle .tx{font-size:13.5px;font-weight:600;flex:1}
  .sw{width:46px;height:27px;border-radius:999px;background:#D5DEDB;position:relative;flex:none;transition:.18s}
  .sw.on{background:var(--teal)}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .sw.on::after{left:22px}

  .lines{background:#fff;border:1px solid var(--line);border-radius:16px;margin-top:11px;overflow:hidden}
  .li{padding:13px 15px;border-top:1px solid var(--line);display:flex;gap:12px;font-size:13.5px;line-height:1.45;align-items:flex-start}
  .li:first-child{border-top:none}
  .li .ic{flex:none;width:20px;color:var(--teal);display:flex;justify-content:center;margin-top:1px}
  .li b{color:var(--teal-d)}
  .li.outpay b{color:var(--coral)}

  details.qa{background:#fff;border:1px solid var(--line);border-radius:14px;margin-top:11px;overflow:hidden}
  details.qa summary{padding:14px 15px;font-weight:700;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px}
  details.qa summary::-webkit-details-marker{display:none}
  details.qa summary .ic0{color:var(--teal);display:flex}
  details.qa summary .chev{margin-left:auto;transition:.2s;color:var(--muted);display:flex}
  details.qa[open] summary .chev{transform:rotate(180deg)}
  details.qa .body{padding:0 15px 14px}
  details.qa .body p{margin:9px 0;font-size:13px;line-height:1.5;color:var(--ink);padding-left:18px;position:relative}
  details.qa .body p::before{content:"›";position:absolute;left:2px;color:var(--teal);font-weight:800}

  .aid-card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px;margin-top:11px;box-shadow:var(--shadow)}
  .aid-card h4{margin:0 0 5px;font-size:15px;font-weight:800;color:var(--coral-d)}
  .aid-card .what{font-size:13px;line-height:1.45;color:var(--ink)}
  .aid-card .how{font-size:12.5px;line-height:1.5;color:var(--muted);margin-top:7px;display:flex;gap:7px}
  .aid-card .how .ic{color:var(--coral);flex:none;margin-top:1px}
  .aid-card a{color:var(--teal-d);font-weight:700;text-decoration:none;font-size:12.5px;display:inline-block;margin-top:8px}

  .regions{display:flex;gap:8px;overflow-x:auto;padding:4px 0 6px;margin-top:12px;scrollbar-width:none}
  .regions::-webkit-scrollbar{display:none}
  .regions button{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:600;font-size:13px;padding:8px 15px;border-radius:999px;flex:none}
  .regions button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .hosp-card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:14px 15px;margin-top:11px;box-shadow:var(--shadow)}
  .hosp-card .hn{font-weight:700;font-size:15px;line-height:1.25}
  .hosp-card .hm{font-size:12px;color:var(--muted);margin-top:3px}
  .hosp-row{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-top:10px;flex-wrap:wrap}
  .htag{display:inline-block;font-size:10.5px;font-weight:700;color:var(--navy);background:#E9F0F4;border-radius:7px;padding:3px 9px}
  a.call{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;font-weight:700;font-size:13px;padding:9px 15px;border-radius:10px;text-decoration:none}
  a.call:active{transform:scale(.97)}

  .fld{margin-top:13px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .fld input,.fld select,.fld textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 13px}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,122,111,.15)}
  .fld textarea{resize:vertical;min-height:62px}
  .submit{width:100%;margin-top:17px;background:var(--gold);color:#fff;font-weight:800;font-size:15px;padding:14px;border-radius:13px;box-shadow:var(--shadow)}
  .submit:active{transform:scale(.99)}
  .okmsg{background:var(--teal-soft);border:1px solid #BFE0DA;color:var(--teal-d);border-radius:13px;padding:16px;text-align:center;font-size:14px;font-weight:600;line-height:1.5;margin-top:13px}

  .disc{font-size:11.5px;color:var(--muted);line-height:1.55;margin-top:16px;padding:0 2px;text-align:center}
  .soon{font-size:12.5px;color:var(--muted);text-align:center;padding:16px;background:#fff;border:1px dashed var(--line);border-radius:14px;margin-top:11px;line-height:1.5}
  .subnote{font-size:12px;color:var(--muted);line-height:1.5;margin:11px 2px 2px}
  .sharebar{width:100%;margin-top:18px;background:var(--teal);color:#fff;border-radius:16px;padding:15px 16px;
    display:flex;align-items:center;justify-content:center;gap:10px;font-weight:700;font-size:14.5px;
    box-shadow:var(--shadow);line-height:1.3;text-align:center}
  .sharebar:active{transform:scale(.99)}
  .sharebar .sub{font-weight:500;opacity:.9}
  .bigbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:12px;
    padding:15px;border-radius:13px;font-weight:700;font-size:15px;text-decoration:none;box-shadow:var(--shadow);border:none}
  .bigbtn.fb{background:#1877F2;color:#fff}
  .bigbtn.msgr{background:#0A7CFF;color:#fff}
  .bigbtn.copy{background:#fff;color:var(--ink);border:1px solid var(--line)}
</style>
</head>

<header>
  <div class="hbar">
    <div class="brand">
      <div class="logo">₱</div>
      <div>
        <h1 id="appName">Magkano?</h1>
        <p id="tagline">Prepare for hospital costs · Philippines</p>
      </div>
    </div>
    <div class="lang">

      <button id="lang-tl" onclick="setLang('tl')">TL</button>

</header>

<div class="wrap">

  <button class="sharebar" id="shareBtn" onclick="shareApp()"></button>

</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>

</div>

let LANG = "en", phStateActive = false, curRegion = "ncr";
const peso = n => "₱" + Math.round(n).toLocaleString("en-PH");
const eur  = n => "€" + Math.round(n/FX).toLocaleString("en-PH");
const t = () => STR[LANG];

function setLang(l){
  LANG = l; document.documentElement.lang = l;
  document.getElementById("lang-en").classList.toggle("on", l==="en");
  document.getElementById("lang-tl").classList.toggle("on", l==="tl");
  renderChrome(); renderGrid(); renderHelp();
  if(openSheetType) reopenSheet();
}
function renderChrome(){
  const s=t(), set=(id,v,html)=>{const e=document.getElementById(id); if(e){html?e.innerHTML=v:e.textContent=v;}};
  set("appName",s.appName); set("tagline",s.tagline); set("heroH",s.heroH); set("heroP",s.heroP);
  set("topNote",s.topNote,true); set("secProc",s.secProc); set("secHelp",s.secHelp);
  set("reviewedTxt",s.reviewed); set("footerTxt",s.footer);
  const sb=document.getElementById("shareBtn");
  if(sb) sb.innerHTML = ic('share',17)+`<span><b>${s.shareBar}</b> <span class="sub">· ${s.shareBarSub}</span></span>`;
  const se=document.getElementById("procSearch"); if(se) se.placeholder=s.searchPH;
}
function renderGrid(){
  const q=((document.getElementById("procSearch")||{}).value||"").toLowerCase().trim();
  const cards = PROCEDURES.map((p,i)=>({p,i}))
    .filter(({p})=> !q || (p.name.en+" "+p.name[LANG]+" "+p.also[LANG]).toLowerCase().includes(q))
    .map(({p,i})=>`
    <button class="card" onclick="openProc(${i})">
      <span class="chip" style="background:${TINTS[i%TINTS.length]}">${p.emo}</span>
      <span><span class="nm">${p.name[LANG]}</span><span class="also">${p.also[LANG]}</span></span>
    </button>`).join("");
  document.getElementById("procGrid").innerHTML = cards || `<div class="soon" style="grid-column:1/-1">${t().noMatch}</div>`;
}
function renderHelp(){
  const s=t();
  document.getElementById("helpRow").innerHTML = `
    <button class="help aid"   onclick="openAid()">  <span class="emo">${ic('cash',23)}</span>     <span><span class="t">${s.aidT}</span><br><span class="s">${s.aidS}</span></span></button>
    <button class="help phil"  onclick="openPhil()"> <span class="emo">${ic('shield',23)}</span>   <span><span class="t">${s.philT}</span><br><span class="s">${s.philS}</span></span></button>
    <button class="help hosp"  onclick="openHosp()"> <span class="emo">${ic('building',23)}</span> <span><span class="t">${s.hospT}</span><br><span class="s">${s.hospS}</span></span></button>
    <button class="help share" onclick="openShare()"><span class="emo">${ic('chat',23)}</span>     <span><span class="t">${s.shareT}</span><br><span class="s">${s.shareS}</span></span></button>`;
}

/* ---- sheet plumbing ---- */
let openSheetType=null, openSheetArg=null;
function showSheet(html){
  document.getElementById("sheetContent").innerHTML=html;
  document.getElementById("sheet").scrollTop=0;
  document.getElementById("scrim").classList.add("show");
  document.getElementById("sheet").classList.add("show");
  document.body.style.overflow="hidden";
}
function closeSheet(){
  document.getElementById("scrim").classList.remove("show");
  document.getElementById("sheet").classList.remove("show");
  document.body.style.overflow=""; openSheetType=null;
}
function reopenSheet(){
  if(openSheetType==="proc") renderProc(openSheetArg);
  else if(openSheetType==="aid") renderAid();
  else if(openSheetType==="phil") renderPhil();
  else if(openSheetType==="hosp") renderHosp();
  else if(openSheetType==="share") renderShare();
  else if(openSheetType==="shareapp") renderShareApp();
}
function sheetHead(emo,title){
  return `<div class="sheet-head"><span class="emo">${emo}</span><h3>${title}</h3>
    <button class="x" onclick="closeSheet()" aria-label="close">${ic('x',15)}</button></div>`;
}

/* ---- procedure estimate ---- */
function openProc(i){ openSheetType="proc"; openSheetArg=i; renderProc(i); }
function renderProc(i){
  const p=PROCEDURES[i], s=t();
  const hasPH=typeof p.philhealth==="number", showPay=hasPH&&phStateActive;
  const ph=showPay?p.philhealth:0;
  const pay=[Math.max(0,p.priv[0]-ph),Math.max(0,p.priv[1]-ph)];
  showSheet(sheetHead(p.emo, p.name[LANG]) + `
    <div class="big">
      <div class="lbl">${s.prepare} · ${s.atPrivate}</div>
      <div class="amt">${peso(p.priv[0])} – ${peso(p.priv[1])}</div>
      <div class="eur">≈ ${eur(p.priv[0])} – ${eur(p.priv[1])} · ${s.confNote[p.conf]}</div>
    </div>
    ${hasPH?`<div class="toggle" onclick="togglePhil()"><span class="tx">🛡️ ${s.havePhil}</span><span class="sw ${phStateActive?'on':''}"></span></div>`:``}
    <div class="lines">
      ${showPay?`<div class="li"><span class="ic">${ic('shield')}</span><span>${s.philCovers} <b>${peso(p.philhealth)}</b></span></div>
        <div class="li outpay"><span class="ic">${ic('cash')}</span><span>${s.youPay} <b>${peso(pay[0])} – ${peso(pay[1])}</b></span></div>`:``}
      ${p.phNote?`<div class="li"><span class="ic">${ic('shield')}</span><span>${p.phNote[LANG]}</span></div>`:``}
      <div class="li"><span class="ic">${ic('hospital')}</span><span>${s.govLine}: <b>${peso(p.gov[0])} – ${peso(p.gov[1])}</b></span></div>
    </div>
    <div class="lines"><div class="li"><span class="ic" style="color:var(--gold)">${ic('warning')}</span><span><b style="color:var(--gold)">${s.notIncl}:</b> ${p.excl[LANG]}</span></div></div>
    <details class="qa" open><summary><span class="ic0">${ic('chat')}</span> ${s.askTitle}<span class="chev">${ic('chevron')}</span></summary>
      <div class="body">${s.asks.map(a=>`<p>${a}</p>`).join("")}</div></details>
    <div class="lines"><div class="li"><span class="ic">${ic('bag')}</span><span><b>${s.bring}:</b> ${s.bringList}</span></div></div>
    <p class="disc">${s.disc||''}</p>`);
}
function togglePhil(){ phStateActive=!phStateActive; renderProc(openSheetArg); }

/* ---- aid ---- */
function openAid(){ openSheetType="aid"; renderAid(); }
function renderAid(){
  const s=t();
  const cards = AID.map(a=>`<div class="aid-card"><h4>${a.name}</h4>
    <div class="what">${a.what[LANG]}</div>
    <div class="how"><span class="ic">${ic('geo')}</span><span>${a.how[LANG]}</span></div>
    ${a.link?`<a href="${a.link}" target="_blank" rel="noopener">${a.link.replace(/^https?:\/\//,'')} ↗</a>`:''}</div>`).join("");
  showSheet(sheetHead(ic('cash',28), s.aidTitle)+cards+`<p class="disc">${t().topNote.replace(/<[^>]+>/g,'')}</p>`);
}
/* ---- philhealth ---- */
function openPhil(){ openSheetType="phil"; renderPhil(); }
function renderPhil(){
  const s=t();
  const body = PHIL.sections.map(sec=>`<details class="qa" open><summary>${sec.icon} ${sec.title[LANG]}<span class="chev">${ic('chevron')}</span></summary>
    <div class="body">${sec.points[LANG].map(p=>`<p>${p}</p>`).join("")}</div></details>`).join("");
  showSheet(sheetHead(ic('shield',28), s.philTitle)+body);
}
/* ---- hospitals ---- */
function openHosp(){ openSheetType="hosp"; renderHosp(); }
function setRegion(k){ curRegion=k; renderHosp(); }
function renderHosp(){
  const s=t();
  const chips = REGIONS.map(r=>`<button class="${r.key===curRegion?'on':''}" onclick="setRegion('${r.key}')">${r.label[LANG]}</button>`).join("");
  const list = HOSPITALS.filter(h=>h.region===curRegion);
  const cards = list.length ? list.map(h=>`<div class="hosp-card">
    <div class="hn">${h.name}</div>
    <div class="hm">${h.city}</div>
    <div class="hosp-row">
      <span class="htag">${h.type}</span>
      ${h.phone?`<a class="call" href="tel:${h.phone.replace(/[^0-9+]/g,'')}">${ic('phone',13)} ${s.call} · ${h.phone}</a>`
        :(h.web?`<a class="call" href="${h.web}" target="_blank" rel="noopener">${s.web} ↗</a>`:'')}
    </div></div>`).join("") : `<div class="soon">Coming soon.</div>`;
  showSheet(sheetHead(ic('building',26), s.hospTitle)
    + `<p class="subnote">${s.hospNote}</p><div class="regions">${chips}</div>` + cards);
}
/* ---- share a price ---- */
function openShare(){ openSheetType="share"; renderShare(); }
function renderShare(){
  const s=t();
  const opts = PROCEDURES.map(p=>`<option value="${p.name.en}">${p.name[LANG]}</option>`).join("")+`<option value="other">${s.optOther}</option>`;
  showSheet(sheetHead(ic('chat',26), s.shareTitle) + `
    <p class="subnote">${s.shareIntro}</p>
    <form onsubmit="submitPrice(event)">
      <div class="fld"><label>${s.fProc}</label><select name="procedure" required>${opts}</select></div>
      <div class="fld"><label>${s.fHosp}</label><input name="hospital" required maxlength="80"></div>
      <div class="fld"><label>${s.fCity}</label><input name="city" maxlength="60"></div>
      <div class="fld"><label>${s.fAmount}</label><input name="amount" type="number" inputmode="numeric" min="0" required></div>
      <div class="fld"><label>${s.fPhil}</label><select name="philhealth"><option value="">—</option><option>${s.optYes}</option><option>${s.optNo}</option><option>${s.optNotSure}</option></select></div>
      <div class="fld"><label>${s.fNotes}</label><textarea name="notes" maxlength="300"></textarea></div>
      <button class="submit" type="submit">${s.submit}</button>
    </form>`);
}
function submitPrice(ev){
  ev.preventDefault();
  const f=ev.target, data={};
  new FormData(f).forEach((v,k)=>data[k]=v);
  data.lang=LANG; data.app="magkano";
  const done=()=>showSheet(sheetHead(ic('chat',26), t().shareTitle)+`<div class="okmsg">${t().thanks}</div>`);
  if(CROWDSOURCE_ENDPOINT){
    fetch(CROWDSOURCE_ENDPOINT,{method:"POST",headers:{'Accept':'application/json','Content-Type':'application/json'},body:JSON.stringify(data)})
      .then(done).catch(done);
  } else {
    console.log("crowdsource submission (not wired):", data);
    showSheet(sheetHead(ic('chat',26), t().shareTitle)+`<div class="okmsg">${t().notWired}</div>`);
  }
}

/* ---- share the app (distribution) ---- */
function shareApp(){
  const s=t();
  if(navigator.share){ navigator.share({title:"Gastimate", text:s.shareText, url:location.href}).catch(()=>{}); return; }
  openSheetType="shareapp"; renderShareApp();
}
function renderShareApp(){
  const s=t(), url=encodeURIComponent(location.href);
  showSheet(sheetHead(ic('share',26), s.shareTitleApp) + `
    <p class="subnote">${s.shareText}</p>
    <a class="bigbtn fb" href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" rel="noopener">${ic('facebook',18)} ${s.onFb}</a>
    <a class="bigbtn msgr" href="fb-messenger://share?link=${url}">${ic('messenger',18)} ${s.onMsgr}</a>
    <button class="bigbtn copy" onclick="copyLink(this)">${ic('link',18)} <span>${s.copyLink}</span></button>`);
}
function copyLink(btn){
  const s=t();
  navigator.clipboard.writeText(location.href).then(()=>{ btn.innerHTML = ic('check',18)+` <span>${s.copied}</span>`; }).catch(()=>{});
}

/* ---- live FX (the one thing we can auto-update) ---- */
fetch("https://open.er-api.com/v6/latest/PHP")
  .then(r=>r.json())
  .then(d=>{ if(d&&d.rates&&d.rates.EUR){ FX=1/d.rates.EUR; if(openSheetType==="proc") reopenSheet(); } })
  .catch(()=>{});

/* ---- init ---- */
renderChrome(); renderGrid(); renderHelp();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
